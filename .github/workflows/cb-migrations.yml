name: DB migrations (folder -> schema)

on:
  workflow_dispatch:
  push:
    paths:
      - "apps/**/supabase/migrations/**"

jobs:
  migrate_infra:
    if: contains(github.event.head_commit.message, '') # keeps job valid even on workflow_dispatch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run infra migrations into schema infra
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          cd apps/infra

          # Build wrapper migrations
          SRC="supabase/migrations"
          BUILD="supabase/migrations_build"
          mkdir -p "$BUILD"
          rm -f "$BUILD"/*.sql

          shopt -s nullglob
          for f in "$SRC"/*.sql; do
            out="$BUILD/$(basename "$f")"
            {
              echo "create schema if not exists infra;"
              echo "set search_path = infra, public;"
              echo ""
              cat "$f"
            } > "$out"
          done

          # Swap build -> active migrations and push
          supabase link --project-ref "$SUPABASE_PROJECT_REF"

          if [ -d supabase/migrations ]; then mv supabase/migrations supabase/migrations_orig; fi
          mv supabase/migrations_build supabase/migrations

          supabase db push

          # restore
          rm -rf supabase/migrations
          if [ -d supabase/migrations_orig ]; then mv supabase/migrations_orig supabase/migrations; fi
