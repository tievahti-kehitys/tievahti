name: DB migrations (folder -> schema)

on:
  workflow_dispatch:
  push:
    paths:
      - "apps/**/supabase/migrations/**"

jobs:
  migrate_infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run infra migrations into schema infra (strip public.)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          cd apps/infra

          # Build wrapper migrations
          SRC="supabase/migrations"
          BUILD="supabase/migrations_build"
          mkdir -p "$BUILD"
          rm -f "$BUILD"/*.sql

          # Keep list (leave empty => everything public.* will be stripped)
          KEEP_PUBLIC_REFS=(
          )

          shopt -s nullglob
          for f in "$SRC"/*.sql; do
            base="$(basename "$f")"
            out="$BUILD/$base"

            tmp="$(mktemp)"
            cp "$f" "$tmp"

            # 1) Protect allowlisted refs by replacing them with placeholders
            i=0
            for ref in "${KEEP_PUBLIC_REFS[@]}"; do
              i=$((i+1))
              placeholder="__KEEP_PUBLIC_${i}__"
              sed -i "s|${ref}|${placeholder}|g" "$tmp"
            done

            # 2) Strip ALL remaining "public."
            # This turns e.g. public.project_roles -> project_roles (goes to infra via search_path)
            sed -i 's/\bpublic\.\b//g' "$tmp"

            # 3) Restore allowlisted refs back to public.*
            i=0
            for ref in "${KEEP_PUBLIC_REFS[@]}"; do
              i=$((i+1))
              placeholder="__KEEP_PUBLIC_${i}__"
              sed -i "s|${placeholder}|${ref}|g" "$tmp"
            done

            # 4) Write wrapped migration
            {
              echo "create schema if not exists infra;"
              echo "set search_path = infra, public;"
              echo ""
              cat "$tmp"
            } > "$out"

            rm -f "$tmp"
          done

          # Swap build -> active migrations and push
          supabase link --project-ref "$SUPABASE_PROJECT_REF"

          if [ -d supabase/migrations ]; then mv supabase/migrations supabase/migrations_orig; fi
          mv supabase/migrations_build supabase/migrations

          # Non-interactive push (avoid Y/n prompt)
          supabase db push --yes

          # restore
          rm -rf supabase/migrations
          if [ -d supabase/migrations_orig ]; then mv supabase/migrations_orig supabase/migrations; fi
