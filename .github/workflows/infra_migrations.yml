      - name: Build migrations with schema wrapper (infra)
        shell: bash
        run: |
          set -euo pipefail

          SRC="apps/infra/supabase/migrations"
          BUILD="apps/infra/supabase/migrations_build"

          mkdir -p "$BUILD"
          rm -f "$BUILD"/*.sql

          shopt -s nullglob
          files=("$SRC"/*.sql)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No migration files found in $SRC"
            exit 0
          fi

          for f in "${files[@]}"; do
            out="$BUILD/$(basename "$f")"
            {
              echo "create schema if not exists infra;"
              echo "set search_path = infra, public;"
              echo ""
              cat "$f"
            } > "$out"
          done

          echo "Built migrations:"
          ls -la "$BUILD"

      - name: Push migrations (infra build folder)
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail

          # link MUST run in the folder that contains supabase/config.toml
          cd apps/infra

          supabase link --project-ref "$SUPABASE_PROJECT_REF"

          # Swap migrations folder inside apps/infra
          if [ -d supabase/migrations ]; then
            mv supabase/migrations supabase/migrations_orig
          fi

          mv supabase/migrations_build supabase/migrations

          supabase db push

          # restore (optional)
          rm -rf supabase/migrations
          if [ -d supabase/migrations_orig ]; then
            mv supabase/migrations_orig supabase/migrations
          fi
