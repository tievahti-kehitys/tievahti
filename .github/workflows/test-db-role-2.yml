      - name: Test infra role (force IPv4 address)
        env:
          INFRA_DB_URL: ${{ secrets.INFRA_DB_URL }}
          PGSSLMODE: require
        run: |
          set -e

          HOST=$(python3 - <<'PY'
import os
from urllib.parse import urlparse
print(urlparse(os.environ["INFRA_DB_URL"]).hostname)
PY
)
          IPV4=$(getent ahostsv4 "$HOST" | awk '{print $1; exit}')
          echo "HOST=$HOST"
          echo "IPV4=$IPV4"

          # strip host part from URL so -h takes effect cleanly
          URL_NO_HOST=$(python3 - <<'PY'
import os
from urllib.parse import urlparse
u=urlparse(os.environ["INFRA_DB_URL"])
# rebuild without hostname (psql will use -h)
userpass = (u.username or "") + ((":"+u.password) if u.password else "")
auth = (userpass + "@") if userpass else ""
port = (":"+str(u.port)) if u.port else ""
path = u.path or ""
query = ("?"+u.query) if u.query else ""
print(f"postgresql://{auth}{port}{path}{query}")
PY
)

          psql "$URL_NO_HOST" -h "$IPV4" -v ON_ERROR_STOP=1 -c "select now();"
