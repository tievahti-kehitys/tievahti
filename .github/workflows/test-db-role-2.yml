name: Test DB role (infra)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install psql + dns utils
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client dnsutils

      - name: Test infra role (force IPv4) + create schema/table
        env:
          INFRA_DB_URL: ${{ secrets.INFRA_DB_URL }}
          PGSSLMODE: require
        shell: bash
        run: |
          set -euo pipefail

          # Extract hostname from the URL (works for postgresql://user:pass@host:port/db?params)
          HOST="$(echo "$INFRA_DB_URL" | sed -E 's#^[a-z]+://([^@]+@)?([^:/?]+).*#\2#')"
          echo "HOST=$HOST"

          # Resolve IPv4 A record
          IPV4="$(dig +short A "$HOST" | head -n 1)"
          echo "IPV4=$IPV4"

          if [ -z "$IPV4" ]; then
            echo "No IPv4 A record found for host"
            exit 1
          fi

          # Force IPv4 connection even if hostname resolves to IPv6 first
          export PGHOSTADDR="$IPV4"

          psql "$INFRA_DB_URL" -v ON_ERROR_STOP=1 -c "select now();"
          psql "$INFRA_DB_URL" -v ON_ERROR_STOP=1 -c "create schema if not exists infra;"
          psql "$INFRA_DB_URL" -v ON_ERROR_STOP=1 -c "create extension if not exists pgcrypto;"
          psql "$INFRA_DB_URL" -v ON_ERROR_STOP=1 -c "create table if not exists infra.projects_test_ci (id uuid primary key default gen_random_uuid());"
          psql "$INFRA_DB_URL" -tA -c "select table_schema, table_name from information_schema.tables where table_name='projects_test_ci';"
