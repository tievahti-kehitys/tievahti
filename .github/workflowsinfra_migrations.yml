name: Infra DB migrations (schema infra)

on:
  workflow_dispatch:
  push:
    paths:
      - "apps/infra/supabase/migrations/**"

jobs:
  migrate:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: apps/infra

    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Build migrations with schema wrapper
        run: |
          set -euo pipefail

          SRC="supabase/migrations"
          BUILD="supabase/migrations_build"

          mkdir -p "$BUILD"
          rm -f "$BUILD"/*.sql

          shopt -s nullglob
          files=("$SRC"/*.sql)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No migration files found in $SRC"
            exit 0
          fi

          for f in "${files[@]}"; do
            out="$BUILD/$(basename "$f")"
            {
              echo "create schema if not exists infra;"
              echo "set search_path = infra, public;"
              echo ""
              cat "$f"
            } > "$out"
          done

          echo "Built migrations:"
          ls -la "$BUILD"

      - name: Push migrations (using build folder)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # Supabase CLI reads migrations from supabase/migrations
          mv supabase/migrations supabase/migrations_orig
          mv supabase/migrations_build supabase/migrations

          supabase db push

          # restore (optional)
          rm -rf supabase/migrations
          mv supabase/migrations_orig supabase/migrations
